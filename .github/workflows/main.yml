name: Maven CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: "21"
          distribution: "temurin"
      - name: Compile with Maven
        run: mvn compile
      - name: Run tests with Maven
        run: mvn test
      - name: Success
        run: echo "Build and tests successful!"

  package:
    runs-on: ubuntu-latest
    needs: build_and_test
    steps:
      - uses: actions/checkout@v3
      - name: Runs mvn package
        run: mvn package
      - uses: actions/upload-artifact@v4
        with:
          name: my-artifact
          path: target/*.jar
      - name: Success
        run: echo "Package successful!"

name: Maven CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: "21"
          distribution: "temurin"
      - name: Restore Maven cache
        uses: skjolber/maven-cache-github-action@v3.1.1
        with:
          step: restore
      - name: Compile with Maven
        run: mvn compile
      - name: Run tests with Maven
        run: mvn test
      - name: Success
        run: echo "Build and tests successful!"
      - name: Runs mvn package
        run: mvn package
      - uses: actions/upload-artifact@v4
        with:
          name: my-artifact
          path: target/*.jar
      - name: Save Maven cache
        uses: skjolber/maven-cache-github-action@v3.1.1
        with:
          step: save
      - name: Job Fail
        if: jobs.build_and_test == 'failure'
        run: echo "Build or tests failed!"
      - name: Success
        run: echo "Package successful!"

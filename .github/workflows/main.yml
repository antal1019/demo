name: Maven CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    strategy:
      matrix:
        java-version: [17, 21]
    steps:
      - uses: act10ns/slack@v2
        with:
          status: ${{ job.status }}
          channel: "#github-workflow"
      - uses: actions/checkout@v3
      - name: Set up JDK 17,21
        uses: actions/setup-java@v3
        with:
          java-version: ${{ matrix.java-version }}
          distribution: "temurin"
      - name: Restore Maven cache
        uses: skjolber/maven-cache-github-action@v3.1.1
        with:
          step: restore
      - name: Compile with Maven
        run: mvn compile
      - name: Run tests with Maven
        run: mvn test
      - name: Success
        run: echo "Build and tests successful!"
      - name: Runs mvn package
        run: mvn package
      - uses: actions/upload-artifact@v4
        with:
          name: my-artifact-${{ matrix.java-version }}
          path: target/*.jar
      - name: Save Maven cache
        uses: skjolber/maven-cache-github-action@v3.1.1
        with:
          step: save
      - name: Job Fail
        if: failure()
        run: echo "Build or tests failesd!"
      - name: Success
        run: echo "Package successful!"
      - uses: act10ns/slack@v2
        with:
          status: ${{ job.status }}
          steps: ${{ toJson(steps) }}
          channel: "#github-workflow"
        if: always()
  deploy:
    needs: build_and_test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to production
        run: echo "Deploying to production..."
      - uses: act10ns/slack@v2
        with:
          status: ${{ job.status }}
          steps: ${{ toJson(steps) }}
          channel: "#github-workflow"
        if: always()
